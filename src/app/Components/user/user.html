<div style="padding: 24px;">
  <h2>Gestión de Usuarios</h2>

  <div style="margin-bottom: 16px;">
    <button mat-raised-button color="primary" (click)="openNewUser()">
      + Nuevo Usuario
    </button>
  </div>

  <table mat-table [dataSource]="users" class="mat-elevation-z2" style="width:100%">

    <ng-container matColumnDef="#">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
    </ng-container>

    <ng-container matColumnDef="UserName">
      <th mat-header-cell *matHeaderCellDef>Usuario</th>
      <td mat-cell *matCellDef="let u">{{ u.UserName }}</td>
    </ng-container>

    <ng-container matColumnDef="Email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.Email }}</td>
    </ng-container>

    <ng-container matColumnDef="State">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let u">
        <span [style.color]="u.State === 1 ? 'green' : 'red'">
          {{ u.State === 1 ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <p *ngIf="users.length === 0" style="color:#888; margin-top:16px;">
    No hay usuarios registrados aún. Usa el botón para agregar uno.
  </p>
</div>
