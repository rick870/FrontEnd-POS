<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">Clientes</h2>
    <button mat-flat-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Nuevo Cliente
    </button>
  </div>

  <div class="filters-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar cliente</mat-label>
      <input matInput [(ngModel)]="textFilter" (keyup.enter)="onSearch()" placeholder="Nombre, DNI, email...">
      <button mat-icon-button matSuffix (click)="onSearch()">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

     <mat-form-field appearance="outline" class="state-filter">
      <mat-label>Estado</mat-label>
      <mat-select [(ngModel)]="stateFilter" (selectionChange)="onSearch()">
        <mat-option [value]="-1">Todos</mat-option>
        <mat-option [value]="1">Activos</mat-option>
        <mat-option [value]="0">Inactivos</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

   


  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="clients">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let c">{{ c.email }}</td>
      </ng-container>

      <ng-container matColumnDef="documentType">
        <th mat-header-cell *matHeaderCellDef>Tipo Doc.</th>
        <td mat-cell *matCellDef="let c">{{ c.documentType }}</td>
      </ng-container>

      <ng-container matColumnDef="documentNumber">
        <th mat-header-cell *matHeaderCellDef>N° Documento</th>
        <td mat-cell *matCellDef="let c">{{ c.documentNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let c">{{ c.phone }}</td>
      </ng-container>

       <ng-container matColumnDef="state">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let c">
          <mat-chip [color]="c.state === 1 ? 'primary' : 'accent'" selected>
            {{ c.stateClient }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="accent" (click)="openDialog(c)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="removeClient(c)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          {{ isLoading ? 'Cargando...' : 'No se encontraron clientes.' }}
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalRecords"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
