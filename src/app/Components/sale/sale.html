<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">Ventas</h2>
    <button mat-flat-button color="primary" (click)="openNewSale()">
      <mat-icon>add</mat-icon> Nueva Venta
    </button>
  </div>

  <div class="filters-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar venta</mat-label>
      <input matInput [(ngModel)]="textFilter" (keyup.enter)="onSearch()" placeholder="N° voucher, cliente...">
      <button mat-icon-button matSuffix (click)="onSearch()">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="sales">

      <ng-container matColumnDef="voucherNumber">
        <th mat-header-cell *matHeaderCellDef>N° Voucher</th>
        <td mat-cell *matCellDef="let s">{{ s.voucherNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="voucherDescription">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let s">{{ s.voucherDescription }}</td>
      </ng-container>

      <ng-container matColumnDef="client">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let s">{{ s.client }}</td>
      </ng-container>

      <ng-container matColumnDef="dateOfSale">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let s">{{ s.dateOfSale | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>

      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let s">S/ {{ s.totalAmount | number:'1.2-2' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="viewDetail(s)" matTooltip="Ver detalle">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="cancelSale(s)" matTooltip="Cancelar venta">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          {{ isLoading ? 'Cargando...' : 'No se encontraron ventas.' }}
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalRecords"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
